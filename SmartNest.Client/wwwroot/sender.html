<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Smart-Nest — Émetteur</title>
<style>
:root{--navy:#0d1b2a;--navy2:#162436;--nb:#253d54;--gold:#c8a84b;--amber:#f5c218;--ok:#34a471;--danger:#e04545;--t1:#eee8dc;--t2:#8fa5bb;--t3:#4e6a82}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);color:var(--t1);font-family:system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px}
.brand{font-size:1.4rem;font-weight:700;margin-bottom:4px}.brand em{color:var(--gold);font-style:normal}
.sub{font-size:.78rem;color:var(--t3);margin-bottom:22px}
.card{background:var(--navy2);border:1px solid var(--nb);border-radius:12px;padding:18px;width:100%;max-width:680px;margin-bottom:14px}
.title{font-size:.75rem;color:var(--gold);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px}
#local-preview{width:100%;aspect-ratio:16/9;background:#000;border-radius:8px;display:block}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:700}
.pill.live{background:rgba(224,69,69,.2);color:#ff8888;border:1px solid rgba(224,69,69,.3)}
.pill.conn{background:rgba(232,160,32,.15);color:#ffc060}
.pill.rec{background:rgba(224,69,69,.2);color:#ff8888}
.pill.off{background:rgba(78,106,130,.1);color:var(--t3)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.btn{padding:9px 18px;border-radius:8px;font-family:inherit;font-weight:600;font-size:.83rem;cursor:pointer;border:none;transition:all .2s}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--amber));color:var(--navy)}
.btn-gold:hover:not(:disabled){transform:translateY(-1px)}
.btn-red{background:rgba(224,69,69,.12);border:1px solid rgba(224,69,69,.3);color:#ff9999}
.btn:disabled{opacity:.45;cursor:not-allowed}
.log{background:rgba(0,0,0,.25);border-radius:7px;padding:10px;font-size:.71rem;color:var(--t2);max-height:180px;overflow-y:auto;font-family:monospace;line-height:1.6}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:.75rem;color:var(--t2);font-weight:500}
.field input{background:var(--navy);border:1px solid var(--nb);border-radius:7px;color:var(--t1);padding:8px 11px;font-size:.84rem;font-family:inherit;width:100%}
.field input:focus{outline:none;border-color:var(--gold)}
</style>
</head>
<body>
<div class="brand">Smart<em>Nest</em></div>
<div class="sub">Module émetteur vidéo</div>

<!-- Config card -->
<div class="card" id="cfg-card">
    <div class="title">Configuration</div>
    <div class="field">
        <label>Identifiant Smart-Nest (Room ID)</label>
        <input type="text" id="inp-room" placeholder="votre_username"/>
    </div>
    <div class="field">
        <label>Token JWT</label>
        <input type="text" id="inp-token" placeholder="eyJhbGci…"/>
    </div>
    <div class="btns">
        <button class="btn btn-gold" onclick="start()">▶ Démarrer</button>
    </div>
</div>

<!-- Stream card — caché au départ -->
<div class="card" id="stream-card" style="display:none">
    <div class="row">
        <div class="title" style="margin:0">Flux local</div>
        <div id="status" class="pill off"><span class="dot"></span>&nbsp;Hors ligne</div>
    </div>
    <video id="local-preview" autoplay muted playsinline></video>
    <div style="font-size:.72rem;color:var(--t3);margin-top:8px" id="conn-info"></div>
    <div class="btns">
        <button class="btn btn-gold" id="btn-rec"  onclick="toggleRec()" disabled>⏺ Enregistrer</button>
        <button class="btn btn-red"  id="btn-stop" onclick="stop()"      disabled>⏹ Arrêter</button>
    </div>
</div>

<div class="card">
    <div class="title">Journal</div>
    <div class="log" id="log">Prêt. Remplissez la configuration et cliquez Démarrer.<br/></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.0/dist/browser/signalr.min.js"></script>
<script src="js/webrtc.js"></script>
<script>
// Lire les params URL
var params  = new URLSearchParams(location.search);
var ROOM_ID = params.get("room")  || "";
var TOKEN   = params.get("token") || "";

// Pré-remplir les champs
if (ROOM_ID) document.getElementById("inp-room").value  = ROOM_ID;
if (TOKEN)   document.getElementById("inp-token").value = TOKEN;

function addLog(m) {
    var el = document.getElementById("log");
    var t  = new Date().toLocaleTimeString("fr-FR");
    el.innerHTML += "<span style='color:var(--t3)'>[" + t + "]</span> " + m + "<br/>";
    el.scrollTop = el.scrollHeight;
}

function setStatus(s) {
    var el  = document.getElementById("status");
    var map = {
        off:  ["off",  "Hors ligne"],
        conn: ["conn", "Connexion…"],
        live: ["live", "En direct"],
        rec:  ["rec",  "⏺ En enregistrement"]
    };
    var arr = map[s] || map["off"];
    el.className = "pill " + arr[0];
    el.innerHTML = "<span class='dot'></span>&nbsp;" + arr[1];
}

// Faux dotnetRef — relaie les événements WebRTC vers les logs
var fakeRef = {
    invokeMethodAsync: function(method, event, dataJson) {
        var d = {};
        try { d = JSON.parse(dataJson); } catch(e) {}
        switch(event) {
            case "hub-connected":
                addLog("✅ Hub SignalR connecté");
                break;
            case "sender-ready":
                addLog("✅ Sender prêt — room: " + ROOM_ID);
                setStatus("live");
                document.getElementById("btn-rec").disabled  = false;
                document.getElementById("btn-stop").disabled = false;
                break;
            case "peer-joined":
                addLog("👁 Viewer connecté — envoi de l'offre…");
                break;
            case "peer-left":
                addLog("👁 Viewer déconnecté");
                break;
            case "connection-state":
                addLog("WebRTC état: " + d.state);
                break;
            case "connection-type":
                var mode = d.type && d.type.includes("relay") ? "TURN relay" : "Direct P2P";
                addLog("🔗 Connexion établie: " + mode);
                document.getElementById("conn-info").textContent = "Mode: " + mode;
                break;
            case "recording-started":
                addLog("⏺ Enregistrement démarré");
                setStatus("rec");
                break;
            case "recording-stopped":
                addLog("⏹ Enregistrement arrêté");
                setStatus("live");
                break;
            case "chunk-uploaded":
                addLog("📤 Segment sauvegardé: " + (d.fileName || ""));
                break;
            case "error":
                addLog("❌ " + (d.message || "Erreur inconnue"));
                break;
        }
    }
};

async function start() {
    var room  = document.getElementById("inp-room").value.trim();
    var token = document.getElementById("inp-token").value.trim();

    if (!room || !token) {
        alert("Room ID et Token JWT requis.");
        return;
    }

    ROOM_ID = room;
    TOKEN   = token;

    await loadIceFromServer();  // ← ajouter ici

    var ok = await SmartNestWebRTC.initSender(ROOM_ID, TOKEN, fakeRef);
    
    // 1. Afficher la carte stream AVANT d'accéder aux boutons
    document.getElementById("cfg-card").style.display    = "none";
    document.getElementById("stream-card").style.display = "block";

    setStatus("conn");
    addLog("Accès à la webcam…");

    // 2. Démarrer le sender
    var ok = await SmartNestWebRTC.initSender(ROOM_ID, TOKEN, fakeRef);

    if (!ok) {
        addLog("❌ Impossible d'accéder à la caméra.");
        setStatus("off");
        document.getElementById("cfg-card").style.display    = "block";
        document.getElementById("stream-card").style.display = "none";
    }
    // Si ok, fakeRef gère l'état via les callbacks
}

async function toggleRec() {
    var btn = document.getElementById("btn-rec");
    if (btn.dataset.recording !== "1") {
        var ok = await SmartNestWebRTC.startRecording(TOKEN);
        if (ok) {
            btn.dataset.recording = "1";
            btn.textContent       = "⏹ Arrêter enreg.";
            btn.className         = "btn btn-red";
        }
    } else {
        btn.disabled    = true;
        btn.textContent = "Finalisation…";
        await SmartNestWebRTC.stopRecording(TOKEN);
        btn.dataset.recording = "0";
        btn.textContent       = "⏺ Enregistrer";
        btn.className         = "btn btn-gold";
        btn.disabled          = false;
    }
}

async function stop() {
    await SmartNestWebRTC.stopAll();
    document.getElementById("local-preview").srcObject = null;
    setStatus("off");
    document.getElementById("btn-rec").disabled  = true;
    document.getElementById("btn-stop").disabled = true;
    document.getElementById("cfg-card").style.display    = "block";
    document.getElementById("stream-card").style.display = "none";
    addLog("⏹ Diffusion arrêtée");
}
// Remplacez le tableau ICE statique par ce chargement dynamique
var ICE_LOADED = false;

async function loadIceFromServer() {
    if (ICE_LOADED) return;
    try {
        var r = await fetch(location.origin + "/api/webrtc/ice-servers", {
            headers: { "Authorization": "Bearer " + TOKEN }
        });
        if (r.ok) {
            var servers = await r.json();
            // Injecter dans webrtc.js
            window._smn_ice_servers = servers;
            ICE_LOADED = true;
            addLog("ICE servers chargés (" + servers.length + ")");
        }
    } catch(e) {
        addLog("ICE fallback (openrelay)");
    }
}

// Auto-démarrage si token et room présents dans l'URL
if (ROOM_ID && TOKEN) {
    document.getElementById("cfg-card").style.display = "none";
    setTimeout(start, 500);
}
</script>
</body>
</html>
