<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Smart-Nest — Émetteur</title>
<style>
:root{--navy:#0d1b2a;--navy-2:#162436;--nb:#253d54;--gold:#c8a84b;--amber:#f5c218;--ok:#34a471;--warn:#e8a020;--danger:#e04545;--t1:#eee8dc;--t2:#8fa5bb;--t3:#4e6a82}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);color:var(--t1);font-family:system-ui,'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px}
.brand{font-size:1.3rem;font-weight:700;margin-bottom:4px;letter-spacing:-.01em}
.brand em{color:var(--gold);font-style:normal}
.sub{font-size:.78rem;color:var(--t3);margin-bottom:22px}
.card{background:var(--navy-2);border:1px solid var(--nb);border-radius:12px;padding:18px;width:100%;max-width:660px;margin-bottom:14px}
.card-title{font-size:.75rem;color:var(--gold);font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:12px}
video{width:100%;aspect-ratio:16/9;background:#000;border-radius:8px;display:block}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:700;letter-spacing:.07em}
.pill.live{background:rgba(224,69,69,.2);color:#ff8888;border:1px solid rgba(224,69,69,.3)}
.pill.rec{background:rgba(224,69,69,.2);color:#ff8888;animation:blink-bg 1s infinite}
.pill.conn{background:rgba(232,160,32,.15);color:#ffc060}
.pill.off{background:rgba(78,106,130,.1);color:var(--t3)}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor}
@keyframes blink-bg{0%,100%{opacity:1}50%{opacity:.6}}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.btn{padding:9px 18px;border-radius:8px;font-family:inherit;font-weight:600;font-size:.83rem;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--amber));color:var(--navy)}
.btn-gold:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 14px rgba(200,168,75,.35)}
.btn-red{background:rgba(224,69,69,.12);border:1px solid rgba(224,69,69,.3);color:#ff9999}
.btn-red:hover:not(:disabled){background:rgba(224,69,69,.22)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.log{background:rgba(0,0,0,.25);border-radius:7px;padding:10px;font-size:.71rem;color:var(--t2);max-height:140px;overflow-y:auto;font-family:monospace;line-height:1.55}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field label{font-size:.75rem;color:var(--t2);font-weight:500}
.field input{background:var(--navy);border:1px solid var(--nb);border-radius:7px;color:var(--t1);padding:8px 11px;font-size:.84rem;font-family:inherit;width:100%}
.field input:focus{outline:none;border-color:var(--gold)}
.info-row{font-size:.72rem;color:var(--t3);margin-top:8px;display:flex;gap:14px;flex-wrap:wrap}
.info-row strong{color:var(--t2)}
.conn-type{font-size:.72rem;color:var(--t3)}
</style>
</head>
<body>
<div class="brand">Smart<em>Nest</em></div>
<div class="sub">Module émetteur vidéo</div>

<div class="card" id="cfg-card">
    <div class="card-title">Configuration</div>
    <div class="field"><label>Identifiant Smart-Nest</label><input id="inp-room" placeholder="votre_username"/></div>
    <div class="field"><label>Token JWT</label><input id="inp-token" placeholder="eyJhbGci…"/></div>
    <div class="btns"><button class="btn btn-gold" onclick="start()">Démarrer la diffusion</button></div>
    <p style="font-size:.72rem;color:var(--t3);margin-top:10px">Astuce : ajoutez <code>?room=xxx&token=yyy</code> dans l'URL pour remplissage automatique.</p>
</div>

<div class="card" id="stream-card" style="display:none">
    <div class="row">
        <div class="card-title" style="margin:0">Flux local</div>
        <div id="status" class="pill off"><span class="dot"></span> Hors ligne</div>
    </div>
    <video id="preview" autoplay muted playsinline></video>
    <div class="info-row">
        <span>Room : <strong id="lbl-room"></strong></span>
        <span id="lbl-conn" class="conn-type"></span>
    </div>
    <div class="btns">
        <button class="btn btn-gold" id="btn-rec" onclick="toggleRec()" disabled>⏺ Enregistrer</button>
        <button class="btn btn-red"  id="btn-stop" onclick="stop()">Arrêter</button>
    </div>
</div>

<div class="card">
    <div class="card-title">Journal</div>
    <div class="log" id="log">Prêt…<br/></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.0/dist/browser/signalr.min.js"></script>
<script>
const params = new URLSearchParams(location.search);
if (params.get("room"))  document.getElementById("inp-room").value  = params.get("room");
if (params.get("token")) document.getElementById("inp-token").value = params.get("token");
if (params.get("room") && params.get("token")) { document.getElementById("cfg-card").style.display="none"; setTimeout(start,600); }

let hub=null,pc=null,stream=null,recorder=null,isRec=false,sessionId=null,recTimer=null;
let currentToken="",viewerConnId=null;

let ICE=[
    {urls:"stun:stun.l.google.com:19302"},
    {urls:"stun:openrelay.metered.ca:80"},
    {urls:"turn:openrelay.metered.ca:80",username:"openrelayproject",credential:"openrelayproject"},
    {urls:"turn:openrelay.metered.ca:443",username:"openrelayproject",credential:"openrelayproject"},
    {urls:"turn:openrelay.metered.ca:443?transport=tcp",username:"openrelayproject",credential:"openrelayproject"},
    {urls:"turns:openrelay.metered.ca:443",username:"openrelayproject",credential:"openrelayproject"}
];

function addLog(m){const el=document.getElementById("log"),t=new Date().toLocaleTimeString("fr-FR");el.innerHTML+=`<span style="color:var(--t3)">[${t}]</span> ${m}<br/>`;el.scrollTop=el.scrollHeight;}
function setStatus(s){const el=document.getElementById("status"),m={off:["off","Hors ligne"],conn:["conn","Connexion…"],live:["live","En direct"],rec:["rec","⏺ Enregistrement"]};const[c,t]=m[s]||m.off;el.className=`pill ${c}`;el.innerHTML=`<span class="dot"></span> ${t}`;}

async function loadIce(t){try{const r=await fetch("/api/webrtc/ice-servers",{headers:{"Authorization":"Bearer "+t}});if(r.ok){const d=await r.json();if(d?.length)ICE=d;addLog("ICE servers chargés ("+d.length+")");}catch(e){addLog("ICE fallback");}}catch(e){}}

async function start(){
    const room=document.getElementById("inp-room").value.trim();
    const tok=document.getElementById("inp-token").value.trim();
    if(!room||!tok){alert("Room ID et Token requis.");return;}
    currentToken=tok;
    document.getElementById("cfg-card").style.display="none";
    document.getElementById("stream-card").style.display="block";
    document.getElementById("lbl-room").textContent=room;
    setStatus("conn"); addLog("Accès caméra…");

    try{stream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720},frameRate:{ideal:25}},audio:true});}
    catch(e){addLog("❌ Caméra refusée: "+e.message);setStatus("off");return;}

    document.getElementById("preview").srcObject=stream; addLog("Webcam OK");
    await loadIce(tok);

    hub=new signalR.HubConnectionBuilder()
        .withUrl("/hubs/webrtc",{accessTokenFactory:()=>tok})
        .withAutomaticReconnect([0,2000,5000,15000]).build();

    hub.on("OfferRequested",id=>{viewerConnId=id;sendOffer(id);});
    hub.on("ReceiveAnswer",async sdp=>{if(pc?.signalingState!=="stable")await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(sdp)));});
    hub.on("ReceiveIceCandidate",async c=>{try{if(pc)await pc.addIceCandidate(new RTCIceCandidate(JSON.parse(c)));}catch(e){}});
    hub.on("PeerJoined",id=>{addLog("Viewer connecté");viewerConnId=id;sendOffer(id);});
    hub.on("PeerLeft",()=>{addLog("Viewer déconnecté");pc?.close();pc=null;});
    hub.onreconnected(async()=>await hub.invoke("JoinRoom",room));

    await hub.start(); await hub.invoke("JoinRoom",room);
    addLog("Hub connecté, room: "+room); setStatus("live");
    document.getElementById("btn-rec").disabled=false;
}

async function sendOffer(vid){
    if(pc){pc.close();}
    pc=new RTCPeerConnection({iceServers:ICE,bundlePolicy:"max-bundle",rtcpMuxPolicy:"require"});
    stream.getTracks().forEach(t=>pc.addTrack(t,stream));
    pc.onicecandidate=async e=>{if(e.candidate&&hub)await hub.invoke("SendIceCandidate","",JSON.stringify(e.candidate),vid);};
    pc.oniceconnectionstatechange=()=>{
        if(pc.iceConnectionState==="connected"||pc.iceConnectionState==="completed"){
            pc.getStats().then(s=>s.forEach(r=>{
                if(r.type==="candidate-pair"&&r.state==="succeeded"){
                    const t=r.localCandidateType+"→"+r.remoteCandidateType;
                    document.getElementById("lbl-conn").textContent="Mode: "+(t.includes("relay")?"TURN relay":"Direct P2P");
                    addLog("Connexion établie: "+t);
                }
            }));
        }
    };
    const offer=await pc.createOffer(); await pc.setLocalDescription(offer);
    await hub.invoke("SendOffer","",JSON.stringify(offer),vid);
    addLog("Offer envoyée");
}

async function toggleRec(){
    const btn=document.getElementById("btn-rec");
    if(!isRec){
        sessionId=Date.now().toString();
        const mime=["video/webm;codecs=vp9,opus","video/webm;codecs=vp8,opus","video/webm"].find(t=>MediaRecorder.isTypeSupported(t))||"video/webm";
        recorder=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:2500000});
        let chunks=[];
        recorder.ondataavailable=e=>{if(e.data?.size>0)chunks.push(e.data);};
        recTimer=setInterval(async()=>{
            if(!chunks.length)return;
            const blob=new Blob(chunks,{type:"video/webm"});chunks=[];
            const fd=new FormData();fd.append("file",blob,"recording.webm");
            try{const r=await fetch(`/api/video/upload?sessionId=${sessionId}`,{method:"POST",headers:{"Authorization":"Bearer "+currentToken},body:fd});if(r.ok){const d=await r.json();addLog("Segment: "+d.fileName);}}catch(e){addLog("Upload err: "+e.message);}
        },60000);
        recorder.start(1000); isRec=true;
        btn.textContent="⏹ Arrêter enreg."; btn.className="btn btn-red";
        setStatus("rec"); addLog("Enregistrement démarré");
    }else{
        clearInterval(recTimer); btn.disabled=true; btn.textContent="Finalisation…";
        await new Promise(r=>{recorder.onstop=r;recorder.stop();});
        isRec=false; recorder=null;
        btn.textContent="⏺ Enregistrer"; btn.className="btn btn-gold"; btn.disabled=false;
        setStatus("live"); addLog("Enregistrement arrêté");
    }
}

async function stop(){
    if(isRec)await toggleRec();
    if(pc){pc.close();pc=null;}
    if(hub){await hub.stop();hub=null;}
    if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;}
    document.getElementById("preview").srcObject=null;
    setStatus("off"); addLog("Diffusion arrêtée");
    document.getElementById("cfg-card").style.display="block";
    document.getElementById("stream-card").style.display="none";
    document.getElementById("btn-rec").disabled=true;
}
</script>
</body>
</html>
